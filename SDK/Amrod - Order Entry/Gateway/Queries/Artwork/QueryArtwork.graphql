query QueryArtwork(
  $description: String
  $extensions: [String!]
  $name: String
  $statuses: [ArtworkQueryStatus!]
  $tags: [String!]
  $types: [ArtworkType!],
  $artworkIds: [ID!]
  $pageSizeForward: Int
  $pageSizeBackward: Int
  $startCursor: String
  $endCursor: String
) {
  artworkQuery(
    first: $pageSizeForward
    last: $pageSizeBackward
    before: $startCursor
    after: $endCursor
    description: $description
    extensions: $extensions
    name: $name
    statuses: $statuses
    tags: $tags
    types: $types
    ids: $artworkIds
  ) {
    pageInfo {
      endCursor
	  startCursor
      hasNextPage
	  hasPreviousPage
    }
    nodes {
      canDelete
      canEdit
      canMove
      canShare
      checksum
      created
      description
      extension
      id
      internalId
      mimeType
      name
      path
      size
      sizeFormatted
      thumbnailUrl
      type
      url
      owner {
        contact {
          code
          emailAddress
        }
        customer {
          code
          name
        }
      }
      security {
        access
      }
      tags {
        color
        id
        name
      }
    }
  }
}

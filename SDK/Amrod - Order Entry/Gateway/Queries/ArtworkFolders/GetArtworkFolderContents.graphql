query GetArtworkFolderContents(
  $folderPath: String!
  $pageSizeForward: Int
  $pageSizeBackward: Int
  $startCursor: String
  $endCursor: String
) {
  artworkFolderContents(
    folderPath: $folderPath
    first: $pageSizeForward
    last: $pageSizeBackward
    before: $startCursor
    after: $endCursor
  ) {
    pageInfo {
       endCursor
	  startCursor
      hasNextPage
	  hasPreviousPage
    }
    nodes {
      canDelete
      canEdit
      canMove
      canShare
      checksum
      created
      description
      extension
      id
      internalId
      mimeType
      name
      path
      size
      sizeFormatted
      status
      thumbnailUrl
      type
      url
      owner {
        contact {
          code
          emailAddress
        }
        customer {
          code
          name
        }
      }
      security {
        access
        contact {
          code
          emailAddress
        }
        customer {
          code
          name
        }
      }
      tags {
        color
        id
        name
      }
    }
  }
}
